<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YOUMATCH — 나만의 패션 큐레이션</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080706;--surface:#111009;--surface2:#191714;
  --text:#EDE8E0;--muted:#6B6560;--accent:#C9956A;
  --border:rgba(237,232,224,0.1);--accent-faint:rgba(201,149,106,0.13);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* Header */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(8,7,6,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 clamp(20px,4vw,64px);
  height:62px;display:flex;align-items:center;justify-content:space-between;
}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:.22em;}
.logo span{color:var(--accent);}
nav{display:flex;gap:28px;}
nav a{font-size:11px;letter-spacing:.1em;color:var(--muted);cursor:pointer;text-decoration:none;}

/* Hero */
.hero{padding:clamp(64px,9vw,130px) clamp(20px,4vw,64px) 0;}
.eyebrow{font-size:9px;letter-spacing:.35em;color:var(--accent);margin-bottom:22px;}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,8vw,96px);font-weight:300;line-height:1.03;margin-bottom:26px;max-width:720px;}
.hero h1 em{color:var(--accent);font-style:italic;}
.hero p{color:var(--muted);font-size:15px;line-height:1.85;max-width:400px;margin-bottom:clamp(52px,7vw,96px);}

/* Selector */
.selector{padding:0 clamp(20px,4vw,64px) clamp(64px,8vw,110px);}
.selector-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;max-width:700px;}
.field{flex:1 1 180px;min-width:160px;}
.field.wide{flex:1 1 210px;min-width:190px;}
.field label{display:block;font-size:9px;letter-spacing:.28em;color:var(--muted);margin-bottom:12px;}
.select-wrap{position:relative;}
select{
  appearance:none;-webkit-appearance:none;
  background:var(--surface);color:var(--text);
  border:1px solid var(--border);border-radius:3px;
  padding:14px 44px 14px 20px;
  font-size:14px;font-family:'DM Sans',sans-serif;letter-spacing:.03em;
  cursor:pointer;outline:none;width:100%;transition:border-color .2s;
}
select:focus{border-color:var(--accent);}
select option{background:#111009;color:#EDE8E0;}
.chevron{position:absolute;right:16px;top:50%;transform:translateY(-50%);pointer-events:none;}
.btn-curate{
  flex:0 0 auto;
  background:var(--accent);color:var(--bg);
  border:1px solid var(--accent);border-radius:3px;
  height:50px;padding:0 44px;
  font-size:12px;letter-spacing:.2em;font-family:'DM Sans',sans-serif;font-weight:500;
  cursor:pointer;transition:all .25s;white-space:nowrap;
}
.btn-curate:disabled{background:transparent;color:var(--muted);border-color:var(--border);cursor:default;}

/* Feed */
.feed{padding:0 clamp(16px,3vw,64px) 120px;}
.feed-header{border-top:1px solid var(--border);padding-top:52px;margin-bottom:36px;display:flex;justify-content:space-between;align-items:flex-end;}
.feed-header h2{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,3.5vw,38px);font-weight:300;}
.feed-label{font-size:9px;letter-spacing:.25em;color:var(--accent);margin-bottom:10px;}
.feed-count{font-size:11px;color:var(--muted);}
.masonry{columns:clamp(150px,20vw,240px);column-gap:10px;}
.masonry-item{break-inside:avoid;margin-bottom:10px;border-radius:3px;overflow:hidden;cursor:pointer;background:var(--surface);opacity:0;animation:fadeUp .55s ease forwards;}
.masonry-item img{width:100%;display:block;transition:transform .5s ease;}
.masonry-item:hover img{transform:scale(1.04);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* Modal */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(8,7,6,0.96);display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
.modal{background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:100%;max-width:820px;display:grid;grid-template-columns:270px 1fr;overflow:hidden;max-height:92vh;}
.modal-img{overflow:hidden;min-height:340px;}
.modal-img img{width:100%;height:100%;object-fit:cover;display:block;}
.modal-panel{padding:32px 28px;overflow-y:auto;}
.modal-top{display:flex;justify-content:space-between;margin-bottom:28px;}
.modal-meta{font-size:9px;letter-spacing:.22em;color:var(--accent);margin-bottom:8px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;line-height:1.15;}
.btn-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1;padding:0;}
.core-label{font-size:8px;letter-spacing:.22em;color:var(--muted);margin-bottom:6px;}
.core-style{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--accent);font-style:italic;font-weight:300;margin-bottom:22px;}
.desc{color:#ABA39A;line-height:1.8;margin-bottom:24px;font-size:13px;}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px;}
.tag{border:1px solid var(--border);border-radius:2px;padding:5px 12px;font-size:11px;color:var(--text);}
.tip-box{background:var(--accent-faint);border:1px solid rgba(201,149,106,0.22);border-radius:4px;padding:14px 16px;margin-bottom:24px;}
.tip-label{font-size:8px;letter-spacing:.18em;color:var(--accent);margin-bottom:5px;}
.tip-text{color:var(--text);line-height:1.65;font-size:13px;}
.occasion-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.occasion{font-size:10px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;}
.shop-section{padding:14px 0;border-bottom:1px solid var(--border);}
.shop-name{color:var(--text);font-size:13px;font-weight:500;}
.shop-cat{font-size:10px;color:var(--muted);margin-top:2px;margin-bottom:10px;}
.product-item{
  display:flex;gap:12px;align-items:center;
  padding:12px 0;border-bottom:1px solid var(--border);
  text-decoration:none;transition:opacity .2s;
}
.product-item:hover{opacity:.8;}
.product-item img{
  width:72px;height:72px;object-fit:cover;
  border-radius:3px;flex-shrink:0;
  border:1px solid var(--border);
}
.product-info{flex:1;min-width:0;}
.product-item-category{font-size:8px;letter-spacing:.18em;color:var(--accent);margin-bottom:3px;}
.product-item-title{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.product-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.product-item-mall{
  font-size:10px;color:var(--text);font-weight:500;
  background:var(--surface);border:1px solid var(--border);
  border-radius:2px;padding:2px 7px;
}
.product-item-price{font-size:12px;color:var(--accent);font-weight:600;}
.product-item-btn{font-size:9px;letter-spacing:.12em;color:var(--muted);border-bottom:1px solid var(--border);}
.product-item--search{border-bottom:1px solid var(--border);}
.spinner{width:14px;height:14px;display:inline-block;border:1.5px solid rgba(201,149,106,0.25);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-row{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;padding:16px 0;}
.error-box{background:var(--accent-faint);border:1px solid rgba(201,149,106,0.3);border-radius:4px;padding:14px 18px;font-size:12px;color:var(--muted);line-height:1.6;}

/* Responsive */
@media(max-width:580px){
  .modal{grid-template-columns:1fr !important;}
  .modal-img{max-height:44vh;}
  nav{display:none;}
}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">YOU<span>M</span>ATCH</div>
  <nav>
    <a>컬렉션</a>
    <a>스타일 가이드</a>
    <a>뉴 인</a>
  </nav>
</header>

<!-- Hero -->
<section class="hero">
  <p class="eyebrow">PERSONALIZED FASHION CURATION</p>
  <h1>
    당신만의<br>
    <em>스타일</em>을<br>
    발견하세요
  </h1>
  <p>연령과 체형을 선택하면,<br>AI가 당신에게 꼭 맞는 패션을 큐레이션합니다.</p>
</section>

<!-- Selector -->
<section class="selector">
  <div class="selector-row">

    <div class="field">
      <label>연령대</label>
      <div class="select-wrap">
        <select id="selAge">
          <option value="" disabled selected>선택하세요</option>
          <option>20대</option><option>30대</option>
          <option>40대</option><option>50대</option><option>60대</option>
        </select>
        <svg class="chevron" width="10" height="6" viewBox="0 0 10 6" fill="none">
          <path d="M1 1L5 5L9 1" stroke="#C9956A" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <div class="field wide">
      <label>체형</label>
      <div class="select-wrap">
        <select id="selBody">
          <option value="" disabled selected>선택하세요</option>
          <option value="s-slim">키 작고 마른</option>
          <option value="s-avg">키 작고 보통</option>
          <option value="s-full">키 작고 통통</option>
          <option value="m-slim">키 중간 마른</option>
          <option value="m-avg">키 중간 보통</option>
          <option value="m-full">키 중간 통통</option>
          <option value="t-slim">키 크고 마른</option>
          <option value="t-avg">키 크고 보통</option>
          <option value="t-full">키 크고 통통</option>
        </select>
        <svg class="chevron" width="10" height="6" viewBox="0 0 10 6" fill="none">
          <path d="M1 1L5 5L9 1" stroke="#C9956A" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <button class="btn-curate" id="btnCurate" disabled onclick="handleCurate()">큐레이팅</button>
  </div>
</section>

<!-- Feed -->
<section class="feed" id="feed" style="display:none;">
  <div class="feed-header">
    <div>
      <p class="feed-label" id="feedLabel"></p>
      <h2>큐레이팅된 스타일</h2>
    </div>
    <span class="feed-count" id="feedCount"></span>
  </div>
  <div class="masonry" id="masonry"></div>
</section>

<!-- Style Modal -->
<div class="overlay" id="modalOverlay" style="display:none;" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-img">
      <img id="modalImg" src="" alt=""/>
    </div>
    <div class="modal-panel">
      <div class="modal-top">
        <div>
          <p class="modal-meta" id="modalMeta"></p>
          <h3 class="modal-title">스타일 분석</h3>
        </div>
        <button class="btn-close" onclick="closeModal()">×</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>
</div>

<script>
const BODY_LABELS = {
  "s-slim":"키 작고 마른","s-avg":"키 작고 보통","s-full":"키 작고 통통",
  "m-slim":"키 중간 마른","m-avg":"키 중간 보통","m-full":"키 중간 통통",
  "t-slim":"키 크고 마른","t-avg":"키 크고 보통","t-full":"키 크고 통통"
};
const BUILD_MAP = {
  "s-slim":"slim","s-avg":"avg","s-full":"full",
  "m-slim":"slim","m-avg":"avg","m-full":"full",
  "t-slim":"slim","t-avg":"avg","t-full":"full"
};
// Unsplash 키워드 기반 패션 이미지 — 항상 패션 사진만 나옴
const POOL = [
  {kw:"korean+street+fashion+woman",      ages:["20대","30대"],                      builds:["slim","avg"]},
  {kw:"casual+chic+outfit+woman",         ages:["20대","30대","40대"],                builds:["avg","slim"]},
  {kw:"elegant+woman+fashion+street",     ages:["30대","40대","50대"],                builds:["avg","full"]},
  {kw:"trendy+fashion+woman+outfit",      ages:["20대","30대"],                      builds:["slim","avg"]},
  {kw:"feminine+dress+fashion+woman",     ages:["20대","30대","40대"],                builds:["slim","avg","full"]},
  {kw:"minimalist+fashion+woman+style",   ages:["30대","40대","50대"],                builds:["slim","avg"]},
  {kw:"chic+blazer+woman+fashion",        ages:["30대","40대","50대"],                builds:["slim","avg","full"]},
  {kw:"classic+fashion+woman+coat",       ages:["40대","50대","60대"],                builds:["slim","avg"]},
  {kw:"streetwear+woman+style+urban",     ages:["20대"],                            builds:["slim","avg"]},
  {kw:"editorial+fashion+woman",          ages:["20대","30대"],                      builds:["slim"]},
  {kw:"colorful+fashion+woman+outfit",    ages:["20대","30대","40대"],                builds:["avg","full"]},
  {kw:"contemporary+fashion+woman+style", ages:["30대","40대","50대"],                builds:["avg","slim"]},
  {kw:"sophisticated+woman+fashion",      ages:["40대","50대","60대"],                builds:["slim","avg"]},
  {kw:"romantic+dress+woman+fashion",     ages:["20대","30대","40대","50대","60대"],  builds:["slim","avg","full"]},
  {kw:"allblack+fashion+woman+luxury",    ages:["30대","40대","50대","60대"],         builds:["slim","avg"]},
  {kw:"retro+vintage+woman+fashion",      ages:["30대","40대"],                      builds:["slim","avg","full"]},
  {kw:"smart+casual+woman+style",         ages:["40대","50대","60대"],                builds:["avg","full"]},
  {kw:"boho+fashion+woman+outfit",        ages:["20대","30대"],                      builds:["slim","avg","full"]},
  {kw:"tailored+suit+woman+fashion",      ages:["30대","40대","50대"],                builds:["slim","avg"]},
  {kw:"sporty+chic+woman+fashion",        ages:["20대","30대"],                      builds:["slim","avg"]},
];
const CLOUD_NAME = "dblhgppk8";

// 연령+체형 → Cloudinary 폴더명 매핑
const FOLDER_MAP = {
  "20대_s-slim": "20_short_thin", "20대_s-avg": "20_short_avg", "20대_s-full": "20_short_full",
  "20대_m-slim": "20_mid_thin",   "20대_m-avg": "20_mid_avg",   "20대_m-full": "20_mid_full",
  "20대_t-slim": "20_tall_thin",  "20대_t-avg": "20_tall_avg",  "20대_t-full": "20_tall_full",
  "30대_s-slim": "30_short_thin", "30대_s-avg": "30_short_avg", "30대_s-full": "30_short_full",
  "30대_m-slim": "30_mid_thin",   "30대_m-avg": "30_mid_avg",   "30대_m-full": "30_mid_full",
  "30대_t-slim": "30_tall_thin",  "30대_t-avg": "30_tall_avg",  "30대_t-full": "30_tall_full",
  "40대_s-slim": "40_short_thin", "40대_s-avg": "40_short_avg", "40대_s-full": "40_short_full",
  "40대_m-slim": "40_mid_thin",   "40대_m-avg": "40_mid_avg",   "40대_m-full": "40_mid_full",
  "40대_t-slim": "40_tall_thin",  "40대_t-avg": "40_tall_avg",  "40대_t-full": "40_tall_full",
  "50대_s-slim": "50_short_thin", "50대_s-avg": "50_short_avg", "50대_s-full": "50_short_full",
  "50대_m-slim": "50_mid_thin",   "50대_m-avg": "50_mid_avg",   "50대_m-full": "50_mid_full",
  "50대_t-slim": "50_tall_thin",  "50대_t-avg": "50_tall_avg",  "50대_t-full": "50_tall_full",
  "60대_s-slim": "60_short_thin", "60대_s-avg": "60_short_avg", "60대_s-full": "60_short_full",
  "60대_m-slim": "60_mid_thin",   "60대_m-avg": "60_mid_avg",   "60대_m-full": "60_mid_full",
  "60대_t-slim": "60_tall_thin",  "60대_t-avg": "60_tall_avg",  "60대_t-full": "60_tall_full",
};

// Cloudinary 폴더에서 이미지 목록 가져오기
async function fetchCloudinaryImages(folder) {
  try {
    const res = await fetch(
      `https://res.cloudinary.com/${CLOUD_NAME}/image/list/${folder}.json`
    );
    if (!res.ok) return [];
    const data = await res.json();
    return (data.resources || []).map(r =>
      `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/q_auto,f_auto/${folder}/${r.public_id.split("/").pop()}`
    );
  } catch {
    return [];
  }
}

const HEIGHTS = [520,640,560,600,480,620];
let currentAge = "", currentBody = "";

document.getElementById("selAge").addEventListener("change", function(){ currentAge=this.value; checkReady(); });
document.getElementById("selBody").addEventListener("change", function(){ currentBody=this.value; checkReady(); });
function checkReady(){ document.getElementById("btnCurate").disabled = !(currentAge && currentBody); }

async function handleCurate(){
  const key = `${currentAge}_${currentBody}`;
  const folder = FOLDER_MAP[key] || "50_short_thin";

  document.getElementById("feedLabel").textContent = currentAge + " · " + BODY_LABELS[currentBody];
  document.getElementById("feedCount").textContent = "로딩 중...";

  const masonry = document.getElementById("masonry");
  masonry.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:20px 0;">이미지 불러오는 중...</div>`;

  const feed = document.getElementById("feed");
  feed.style.display = "block";
  setTimeout(() => feed.scrollIntoView({behavior:"smooth",block:"start"}), 80);

  // Cloudinary에서 이미지 목록 가져오기
  let imageUrls = await fetchCloudinaryImages(folder);

  // 해당 폴더 이미지 없으면 50_short_thin 폴더로 대체
  if(!imageUrls.length) {
    imageUrls = await fetchCloudinaryImages("50_short_thin");
  }

  if(!imageUrls.length) {
    masonry.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:20px 0;">이미지를 준비 중이에요. 곧 업데이트됩니다 :)</div>`;
    document.getElementById("feedCount").textContent = "0개";
    return;
  }

  // 랜덤 셔플
  const shuffled = imageUrls.sort(() => Math.random() - 0.5);
  document.getElementById("feedCount").textContent = shuffled.length + "개";
  masonry.innerHTML = "";

  shuffled.forEach((url, i) => {
    const wrap = document.createElement("div");
    wrap.className = "masonry-item";
    wrap.style.animationDelay = (i*55)+"ms";
    wrap.onclick = () => openModal(url);

    const el = document.createElement("img");
    el.src = url;
    el.alt = "";
    el.draggable = false;
    el.style.width = "100%";
    el.style.display = "block";
    el.style.transition = "transform 0.5s ease";
    el.onmouseenter = function(){ this.style.transform="scale(1.04)"; };
    el.onmouseleave = function(){ this.style.transform="scale(1)"; };
    el.onerror = function(){ this.closest(".masonry-item").style.display="none"; };

    wrap.appendChild(el);
    masonry.appendChild(wrap);
  });
}

function openModal(imgUrl){
  document.getElementById("modalImg").src = imgUrl;
  document.getElementById("modalImg").onerror = function(){ this.src=""; };
  document.getElementById("modalMeta").textContent = currentAge + " · " + BODY_LABELS[currentBody];
  document.getElementById("modalContent").innerHTML = '<div class="loading-row"><span class="spinner"></span> AI가 이미지를 분석하는 중...</div>';
  document.getElementById("modalOverlay").style.display = "flex";
  document.body.style.overflow = "hidden";
  analyzeStyle(imgUrl);
}
function closeModal(){ document.getElementById("modalOverlay").style.display="none"; document.body.style.overflow=""; }
function handleOverlayClick(e){ if(e.target===e.currentTarget) closeModal(); }

async function analyzeStyle(imgUrl){
  const content = document.getElementById("modalContent");
  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        age: currentAge,
        bodyType: BODY_LABELS[currentBody],
        imageUrl: imgUrl
      })
    });
    if(!res.ok) throw new Error("server error");
    const a = await res.json();
    renderAnalysis(a);
  } catch(e) {
    content.innerHTML = `<div class="error-box">분석 중 오류가 발생했어요.<br>잠시 후 다시 시도해 주세요.</div>`;
  }
}

function renderAnalysis(a){
  const content = document.getElementById("modalContent");
  let html = "";

  if(a.coreStyle) html += `
    <p class="core-label">CORE STYLE</p>
    <p class="core-style">${a.coreStyle}</p>`;

  if(a.description) html += `<p class="desc">${a.description}</p>`;

  if(a.keyItems?.length) html += `
    <p class="core-label" style="margin-bottom:10px;">KEY ITEMS</p>
    <div class="tag-row">${a.keyItems.map(i=>`<span class="tag">${i}</span>`).join("")}</div>`;

  if(a.tip) html += `
    <div class="tip-box">
      <p class="tip-label">STYLE TIP</p>
      <p class="tip-text">${a.tip}</p>
    </div>`;

  if(a.occasions?.length) html += `
    <div class="occasion-row">${a.occasions.map(o=>`<span class="occasion">#${o}</span>`).join("")}</div>`;

  if(a.shopping?.length){
    html += `<p class="shop-label">유사 상품</p>`;
    a.shopping.forEach(s => {
      const p = s.products?.[0];
      if(p){
        html += `
          <a href="${p.link}" target="_blank" rel="noopener" class="product-item">
            <img src="${p.image}" alt="${p.title}" onerror="this.style.display='none'"/>
            <div class="product-info">
              <p class="product-item-category">${s.item}</p>
              <p class="product-item-title">${p.title.replace(/<[^>]+>/g,"")}</p>
              <div class="product-meta">
                <span class="product-item-mall">${p.mall}</span>
                <span class="product-item-price">${p.price}</span>
              </div>
              <span class="product-item-btn">상품 보기 →</span>
            </div>
          </a>`;
      } else {
        const q = encodeURIComponent(s.keyword || s.item);
        html += `
          <a href="https://search.shopping.naver.com/search/all?query=${q}"
            target="_blank" rel="noopener" class="product-item product-item--search">
            <div class="product-info">
              <p class="product-item-category">${s.item}</p>
              <p class="product-item-title" style="color:var(--muted)">유사 상품 검색하기</p>
              <span class="product-item-btn">검색 결과 보기 →</span>
            </div>
          </a>`;
      }
    });
  }

  content.innerHTML = html;
}
</script>
</body>
</html>
